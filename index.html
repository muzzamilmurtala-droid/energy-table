<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Expenditures Table</title>

<style>
    body{
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    table{
        border-collapse: collapse;
        width: 100%;
        max-width: 1000px;
        margin: auto;
    }

    th, td{
        border: 1px solid #ccc;
        padding: 15px;
        text-align: center;
    }

    h2{
        text-align: center;
        color: #2c4fa3;
    }

    .subtitle{
        text-align: center;
        color: #2c4fa3;
        margin-bottom: 20px;
    }

    th{
        color: #2c4fa3;
        font-weight: bold;
    }

    .left{
        text-align: left;
    }
</style>
</head>

<body>

<h2>Energy Expenditures for Each Region</h2>
<div class="subtitle">(millions of dollars)</div>

<table>

    <!-- Top Header -->
    <tr>
        <th colspan="2" rowspan="4"></th>
        <th colspan="2">Type</th>
    </tr>

    <tr>
        <th>Residential Customers</th>
        <th>Business Customers</th>
    </tr>

    <tr>
        <th>Expenditures</th>
        <th>Expenditures</th>
    </tr>

    <tr>
        <th>Sum</th>
        <th>Sum</th>
    </tr>

    <!-- Column Headers -->
    <tr>
        <th class="left">Region</th>
        <th class="left">Division</th>
        <th></th>
        <th></th>
    </tr>

    <!-- Northeast -->
    <tr>
        <td rowspan="2" class="left">Northeast</td>
        <td class="left">New England</td>
        <td>$7,477</td>
        <td>$5,129</td>
    </tr>

    <tr>
        <td class="left">Middle Atlantic</td>
        <td>$19,379</td>
        <td>$15,078</td>
    </tr>

    <!-- West -->
    <tr>
        <td rowspan="2" class="left">West</td>
        <td class="left">Mountain</td>
        <td>$5,476</td>
        <td>$4,729</td>
    </tr>

    <tr>
        <td class="left">Pacific</td>
        <td>$13,959</td>
        <td>$12,619</td>
    </tr>

</table>

</body>
</html>
